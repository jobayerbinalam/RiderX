<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiderX Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

    <!-- Auth Screen -->
    <div id="screen-auth" class="p-6">
        <h1 class="text-3xl font-black mb-2 text-amber-500">RIDERX</h1>
        <div class="flex gap-2 mb-6">
            <button id="tab-signin" onclick="toggleAuthTab('signin')" class="flex-1 py-2.5 text-xs font-black rounded-xl bg-amber-500 text-slate-950">SIGN IN</button>
            <button id="tab-signup" onclick="toggleAuthTab('signup')" class="flex-1 py-2.5 text-xs font-black rounded-xl text-gray-400">SIGN UP</button>
        </div>
        <input id="inp-phone" class="w-full bg-slate-900 p-3 rounded-xl mb-4" placeholder="Phone Token">
        <input id="inp-password" type="password" class="w-full bg-slate-900 p-3 rounded-xl mb-4" placeholder="Password">
        <div id="signup-extra-fields" class="hidden space-y-4 mb-4">
            <input id="inp-username" class="w-full bg-slate-900 p-3 rounded-xl" placeholder="Display Name">
            <input id="inp-sos" class="w-full bg-slate-900 p-3 rounded-xl" placeholder="SOS Phone">
        </div>
        <button onclick="processAuthSubmission()" id="btn-auth-text" class="w-full py-4 bg-amber-500 text-slate-950 font-black rounded-xl">SUBMIT</button>
        <p id="auth-feedback" class="text-red-500 mt-4 text-xs"></p>
    </div>

    <!-- Dashboard Screen -->
    <div id="screen-dashboard" class="hidden p-6">
        <h2 class="text-lg font-black mb-4">ACTIVE MESH</h2>
        <div id="live-channel-feed" class="space-y-3"></div>
        <button onclick="revealModalContainer(true)" class="mt-6 w-full py-4 bg-slate-900 border border-dashed border-amber-500 text-amber-500 font-bold rounded-xl text-sm">+ CREATE CHANNEL</button>
    </div>

    <!-- Intercom Screen -->
    <div id="screen-intercom" class="hidden p-6">
        <h2 id="hud-txt-title" class="text-xl font-black text-amber-500"></h2>
        <div id="live-telemetry-map" class="h-64 w-full bg-slate-800 rounded-xl my-4"></div>
        <div id="comms-timer-lbl" class="text-4xl font-mono text-center">00:00</div>
        <button onclick="terminateIntercomChannel()" class="mt-6 w-full py-4 bg-red-900 text-red-200 font-bold rounded-xl">END CHANNEL</button>
    </div>

    <!-- Modal -->
    <div id="modal-container-create" class="hidden fixed inset-0 bg-slate-950 p-6">
        <h2 class="text-xl font-bold mb-4">New Channel</h2>
        <input id="form-title" class="w-full bg-slate-900 p-3 rounded-xl mb-2" placeholder="Channel Name">
        <input id="form-meet" class="w-full bg-slate-900 p-3 rounded-xl mb-2" placeholder="Meeting Point">
        <input id="form-dest" class="w-full bg-slate-900 p-3 rounded-xl mb-4" placeholder="Destination">
        <button onclick="executeCloudRideCreation()" class="w-full py-4 bg-amber-500 text-slate-950 font-bold rounded-xl">START</button>
    </div>

    <script>
        const SUPABASE_URL = "https://dwkwagsortdumhryaqoq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_XMHxWK_EnLhTLuWILycphA_o3aPPebX";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let sessionProfile = null;
        let leafletMapInstance = null;

        async function processAuthSubmission() {
            const phone = document.getElementById('inp-phone').value;
            const pass = document.getElementById('inp-password').value;
            const { data, error } = await supabase.from('global_users').select('*').eq('phone', phone).maybeSingle();
            if(data && data.pass === pass) {
                sessionProfile = data;
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                syncChannelsFeedView();
            } else {
                alert("Auth Failed");
            }
        }

        async function syncChannelsFeedView() {
            const { data } = await supabase.from('global_rides').select('*');
            const container = document.getElementById('live-channel-feed');
            container.innerHTML = "";
            data.forEach(ride => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-4 rounded-xl border border-slate-800";
                div.innerHTML = `<h4 class="font-bold text-amber-500">${ride.title}</h4><p class="text-xs text-gray-400">${ride.meet} to ${ride.dest}</p>`;
                div.onclick = () => initializeLiveIntercomCommsMesh(ride);
                container.appendChild(div);
            });
        }

        function revealModalContainer(show) { document.getElementById('modal-container-create').classList.toggle('hidden', !show); }

        async function executeCloudRideCreation() {
            const record = {
                id: "CH-" + Date.now(),
                title: document.getElementById('form-title').value,
                meet: document.getElementById('form-meet').value,
                dest: document.getElementById('form-dest').value
            };
            await supabase.from('global_rides').insert([record]);
            revealModalContainer(false);
            syncChannelsFeedView();
        }

        function initializeLiveIntercomCommsMesh(ride) {
            document.getElementById('screen-dashboard').classList.add('hidden');
            document.getElementById('screen-intercom').classList.remove('hidden');
            document.getElementById('hud-txt-title').innerText = ride.title;
            if(!leafletMapInstance) {
                leafletMapInstance = L.map('live-telemetry-map').setView([23.8103, 90.4125], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMapInstance);
            }
        }

        function terminateIntercomChannel() {
            document.getElementById('screen-intercom').classList.add('hidden');
            document.getElementById('screen-dashboard').classList.remove('hidden');
        }

        function toggleAuthTab(tab) {
            document.getElementById('signup-extra-fields').classList.toggle('hidden', tab === 'signin');
        }
    </script>
</body>
</html>
