<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RiderX Mesh System V2</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- Agora Web SDK for Group Voice Intercom -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        
        /* Custom Tooltip Style for Leaflet */
        .rider-map-label {
            background-color: rgba(15, 23, 42, 0.9);
            border: 1px solid #f59e0b;
            color: #f59e0b;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .leaflet-tooltip-left.rider-map-label::before { border-left-color: #f59e0b; }
        .leaflet-tooltip-right.rider-map-label::before { border-right-color: #f59e0b; }
    </style>
</head>
<body class="bg-black text-white h-[100dvh] w-screen overflow-hidden font-sans flex flex-col no-scrollbar select-none">

    <!-- ========================================== -->
    <!-- SCREEN 1: AUTHENTICATION                   -->
    <!-- ========================================== -->
    <div id="screen-auth" class="flex flex-col h-full p-6 max-w-md mx-auto w-full justify-center space-y-4">
        <div class="text-center mb-4">
            <i class="fas fa-motorcycle text-4xl text-amber-500 mb-2"></i>
            <h1 class="text-2xl font-black tracking-widest text-white uppercase">RiderX Mesh</h1>
        </div>
        
        <div class="flex gap-2 bg-slate-900 p-1.5 rounded-xl border border-slate-800">
            <button id="tab-signin" onclick="toggleAuthTab('signin')" class="flex-1 py-2.5 text-xs font-black rounded-xl bg-amber-500 text-slate-950 transition-all duration-200">SIGN IN</button>
            <button id="tab-signup" onclick="toggleAuthTab('signup')" class="flex-1 py-2.5 text-xs font-black rounded-xl text-gray-400 transition-all duration-200">SIGN UP</button>
        </div>

        <div class="space-y-3 mt-4">
            <input id="inp-phone" type="tel" placeholder="Mobile Token (Phone)" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            
            <div class="relative">
                <input id="inp-password" type="password" placeholder="Security Password" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
                <button onclick="togglePasswordVisibility('inp-password')" class="absolute right-4 top-3 text-gray-500"><i id="inp-password-eye" class="fas fa-eye"></i></button>
            </div>

            <!-- Extra Fields for Registration -->
            <div id="signup-extra-fields" class="hidden space-y-3 mt-3 border-t border-slate-800 pt-3">
                <input id="inp-username" type="text" placeholder="Rider Callsign (Name)" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
                <input id="inp-sos" type="tel" placeholder="Emergency SOS Phone" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
                
                <select id="inp-blood" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-gray-400 focus:outline-none focus:border-amber-500 appearance-none">
                    <option value="O+">O Positive (O+)</option>
                    <option value="O-">O Negative (O-)</option>
                    <option value="A+">A Positive (A+)</option>
                    <option value="A-">A Negative (A-)</option>
                    <option value="B+">B Positive (B+)</option>
                    <option value="B-">B Negative (B-)</option>
                    <option value="AB+">AB Positive (AB+)</option>
                    <option value="AB-">AB Negative (AB-)</option>
                </select>

                <input type="hidden" id="inp-gender" value="Boy">
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-reg-gender-boy" onclick="selectGenderRegistration('Boy')" class="bg-slate-900 border-2 border-blue-500 text-blue-400 p-3 rounded-xl font-bold text-xs flex flex-col items-center justify-center gap-1.5 transition"><i class="fas fa-mars text-lg"></i> Boy</button>
                    <button id="btn-reg-gender-girl" onclick="selectGenderRegistration('Girl')" class="bg-slate-900 border-2 border-slate-800 text-gray-500 p-3 rounded-xl font-bold text-xs flex flex-col items-center justify-center gap-1.5 transition"><i class="fas fa-venus text-lg"></i> Girl</button>
                </div>

                <input type="hidden" id="inp-transport" value="Motorcycle">
                <div class="grid grid-cols-3 gap-2">
                    <button id="btn-reg-trans-motor" onclick="selectTransportRegistration('Motorcycle')" class="bg-slate-900 border-2 border-amber-500 text-amber-500 p-2.5 rounded-xl font-bold text-[10px] flex flex-col items-center justify-center gap-1 transition"><i class="fas fa-motorcycle text-sm"></i> Moto</button>
                    <button id="btn-reg-trans-bike" onclick="selectTransportRegistration('Bicycle')" class="bg-slate-900 border-2 border-slate-800 text-gray-500 p-2.5 rounded-xl font-bold text-[10px] flex flex-col items-center justify-center gap-1 transition"><i class="fas fa-bicycle text-sm"></i> Bike</button>
                    <button id="btn-reg-trans-scoot" onclick="selectTransportRegistration('Scooter')" class="bg-slate-900 border-2 border-slate-800 text-gray-500 p-2.5 rounded-xl font-bold text-[10px] flex flex-col items-center justify-center gap-1 transition"><i class="fas fa-bolt text-sm"></i> Scoot</button>
                </div>
            </div>

            <div id="auth-feedback" class="hidden text-[10px] text-red-500 bg-red-950/40 border border-red-900/50 p-2 rounded text-center font-bold"></div>

            <button onclick="processAuthSubmission()" class="w-full bg-amber-500 text-slate-950 font-black text-xs py-3.5 rounded-xl uppercase tracking-widest mt-4 hover:bg-amber-400 active:scale-95 transition">
                <span id="btn-auth-text">Sign In Securely</span>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCREEN 2: DASHBOARD                        -->
    <!-- ========================================== -->
    <div id="screen-dashboard" class="hidden flex flex-col h-full w-full max-w-md mx-auto">
        <!-- Header Profile -->
        <div class="bg-slate-900 p-5 rounded-b-3xl border-b border-slate-800 shrink-0 shadow-lg">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 id="dash-lbl-name" class="text-xl font-black text-white uppercase tracking-wide"></h1>
                    <div class="flex gap-2 mt-1.5">
                        <span id="dash-badge-gender"></span>
                        <span id="dash-badge-transport" class="text-[9px] uppercase font-bold tracking-widest px-2 py-0.5 rounded border bg-amber-500/10 text-amber-500 border-amber-500/30"></span>
                    </div>
                </div>
                <div>
                    <button onclick="openProfileModal()" class="text-gray-500 hover:text-amber-500 transition mr-3"><i class="fas fa-user-edit text-lg"></i></button>
                    <button onclick="terminateSessionToken()" class="text-gray-500 hover:text-red-500 transition"><i class="fas fa-power-off text-lg"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-950 p-3 rounded-2xl border border-slate-850">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-0.5"><i class="fas fa-droplet text-red-500 mr-1"></i> Blood Profile</span>
                    <span id="dash-lbl-blood" class="text-sm font-black text-white"></span>
                </div>
                <div class="bg-slate-950 p-3 rounded-2xl border border-slate-850">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-0.5"><i class="fas fa-phone text-emerald-500 mr-1"></i> SOS Kin</span>
                    <span id="dash-lbl-sos" class="text-sm font-black text-white"></span>
                </div>
            </div>
        </div>

        <!-- Action Area -->
        <div class="flex-1 p-5 overflow-y-auto space-y-5 no-scrollbar">
            <div class="flex gap-3">
                <button onclick="openNewRideModal()" class="flex-1 bg-amber-500 text-slate-950 p-3 rounded-xl font-black text-[10px] uppercase tracking-wider flex items-center justify-center gap-2 active:scale-95 transition"><i class="fas fa-plus"></i> New Mesh</button>
                <button onclick="transitionViewportContext('history')" class="flex-1 bg-slate-900 border border-slate-800 text-white p-3 rounded-xl font-black text-[10px] uppercase tracking-wider flex items-center justify-center gap-2 active:scale-95 transition"><i class="fas fa-history"></i> Log History</button>
            </div>

            <!-- Feed -->
            <div>
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3 pl-1"><i class="fas fa-broadcast-tower text-amber-500 mr-1"></i> Live Channels</h3>
                <div id="live-channel-feed" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCREEN 3: RIDE HISTORY                     -->
    <!-- ========================================== -->
    <div id="screen-history" class="hidden flex flex-col h-full w-full max-w-md mx-auto p-5">
        <div class="flex items-center gap-3 mb-6 shrink-0">
            <button onclick="transitionViewportContext('dashboard')" class="w-10 h-10 rounded-full bg-slate-900 border border-slate-800 text-white flex items-center justify-center active:scale-95 transition"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-lg font-black text-white uppercase tracking-widest">Deployment Logs</h2>
        </div>
        <div id="history-container-node" class="flex-1 overflow-y-auto space-y-3 no-scrollbar pb-5"></div>
    </div>

    <!-- ========================================== -->
    <!-- SCREEN 4: LIVE INTERCOM & MESH CHAT        -->
    <!-- ========================================== -->
    <div id="screen-intercom" class="hidden flex flex-col h-full w-full max-w-md mx-auto bg-slate-950 relative">
        
        <!-- Active Talking Overlay -->
        <div id="active-riders-overlay" class="absolute top-20 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

        <div class="bg-slate-900 p-4 shrink-0 flex justify-between items-start border-b border-slate-800 z-20 shadow-md">
            <div>
                <h2 id="hud-txt-title" class="text-amber-500 font-black text-sm uppercase"></h2>
                <p id="hud-txt-path" class="text-[10px] text-gray-400 mt-1"></p>
                <div class="text-emerald-400 text-[10px] font-mono mt-1.5 font-bold animate-pulse">
                    <i class="fas fa-satellite-dish mr-1"></i> LIVE MESH <span id="comms-timer-lbl" class="ml-1 text-white">00:00</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btn-audio-mic" onclick="toggleAudioHardwareState('mic')" class="px-2.5 py-1.5 rounded bg-slate-900 border border-slate-800 text-emerald-400 transition text-sm"><i class="fas fa-microphone"></i></button>
                <button id="btn-audio-speaker" onclick="toggleAudioHardwareState('speaker')" class="px-2.5 py-1.5 rounded bg-slate-900 border border-slate-800 text-emerald-400 transition text-sm"><i class="fas fa-volume-up"></i></button>
                <button onclick="terminateIntercomChannel()" class="px-3 py-1.5 rounded bg-red-950/40 border border-red-900/30 text-red-500 font-black text-[10px] uppercase tracking-wider ml-1">Leave</button>
            </div>
        </div>

        <div id="live-telemetry-map" class="h-44 w-full shrink-0 z-0 bg-slate-800 border-b border-slate-900"></div>

        <div class="bg-slate-950 p-3 border-b border-slate-900 shrink-0 space-y-3 z-10 shadow-lg">
            <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="sendUtilityRequest('🍔 FOOD REQUEST: Need a meal/water stop!')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black rounded-xl flex items-center justify-center gap-2 transition active:scale-95 text-sm py-5 uppercase tracking-wide">
                    <i class="fas fa-utensils text-lg"></i> Food
                </button>
                <button type="button" onclick="sendUtilityRequest('⛽ FUEL REQUEST: Low on gas / station needed!')" class="bg-sky-600 hover:bg-sky-700 text-white font-black rounded-xl flex items-center justify-center gap-2 transition active:scale-95 text-sm py-5 uppercase tracking-wide">
                    <i class="fas fa-gas-pump text-lg"></i> Fuel
                </button>
            </div>
            
            <div class="w-full">
                <button type="button" onclick="armGlobalEmergencyPanicSignal()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black rounded-xl flex items-center justify-center gap-1.5 transition active:scale-95 shadow-md shadow-red-600/20 text-[10px] uppercase tracking-wider py-3">
                    <i class="fas fa-bolt animate-pulse"></i> BROADCAST EMERGENCY SOS
                </button>
            </div>
        </div>

        <div id="chat-stream-node" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-950 flex flex-col z-10 no-scrollbar"></div>

        <div class="p-3 bg-slate-900 border-t border-slate-800 shrink-0 flex items-center space-x-2 z-10 pb-5 shadow-[0_-4px_15px_-5px_rgba(0,0,0,0.5)]">
            <input id="inp-chat-msg" type="text" placeholder="Transmit message to mesh..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-amber-500/50">
            <button type="button" onclick="commitChatMessageNode()" class="bg-amber-500 text-slate-950 px-5 py-3.5 rounded-xl transition font-black text-xs shrink-0 active:scale-95 hover:bg-amber-400"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- MODAL: CREATE / EDIT RIDE                  -->
    <!-- ========================================== -->
    <div id="modal-container-create" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
            <h3 id="modal-ride-title" class="text-amber-500 font-black text-sm uppercase tracking-widest border-b border-slate-800 pb-3 mb-4"><i class="fas fa-route mr-1"></i> Initialize Deployment</h3>
            
            <input id="form-title" type="text" placeholder="Operation Title (e.g. Night Ride)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            <input id="form-meet" type="text" placeholder="Rally Point (Meeting Area)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            <input id="form-dest" type="text" placeholder="Destination Point" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            
            <div class="grid grid-cols-2 gap-3">
                <input id="form-date" type="date" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-[10px] text-gray-400 focus:outline-none focus:border-amber-500">
                <input id="form-time" type="time" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-[10px] text-gray-400 focus:outline-none focus:border-amber-500">
            </div>
            
            <input id="form-speed" type="text" placeholder="Target Cruising Speed (km/h)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            
            <div class="flex flex-col gap-2 mt-2 bg-slate-950 p-3 rounded-xl border border-slate-800">
                <label class="text-[10px] text-gray-400 font-bold uppercase">Group Privacy:</label>
                <select id="form-privacy" onchange="togglePasscodeField()" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-[11px] text-white outline-none focus:border-amber-500">
                    <option value="public">🌍 Public (Anyone can join)</option>
                    <option value="private">🔒 Private (Needs a Passcode)</option>
                </select>
                <input id="form-passcode" type="text" placeholder="Type a Secret Passcode" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-[11px] text-white focus:outline-none focus:border-amber-500 mt-1 hidden">
            </div>

            <div class="flex gap-3 pt-2 border-t border-slate-800">
                <button onclick="revealModalContainer(false)" class="flex-1 bg-slate-800 text-gray-400 font-black text-[10px] py-3.5 rounded-xl uppercase tracking-widest active:scale-95 transition mt-2">Cancel</button>
                <button id="btn-deploy-ride" onclick="executeCloudRideCreation()" class="flex-1 bg-amber-500 text-slate-950 font-black text-[10px] py-3.5 rounded-xl uppercase tracking-widest active:scale-95 transition mt-2">Deploy</button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- MODAL: EDIT FULL PROFILE                   -->
    <!-- ========================================== -->
    <div id="modal-container-profile" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
            <h3 class="text-amber-500 font-black text-sm uppercase tracking-widest border-b border-slate-800 pb-3 mb-4"><i class="fas fa-user-edit mr-1"></i> Edit Your Profile</h3>
            
            <label class="text-[10px] text-gray-500 uppercase font-bold">Rider Callsign (Name)</label>
            <input id="edit-username" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            
            <label class="text-[10px] text-gray-500 uppercase font-bold mt-2">Emergency SOS Phone</label>
            <input id="edit-sos" type="tel" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-amber-500">
            
            <label class="text-[10px] text-gray-500 uppercase font-bold mt-2">Blood Type</label>
            <select id="edit-blood" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-gray-300 focus:outline-none focus:border-amber-500 appearance-none">
                <option value="O+">O Positive (O+)</option>
                <option value="O-">O Negative (O-)</option>
                <option value="A+">A Positive (A+)</option>
                <option value="A-">A Negative (A-)</option>
                <option value="B+">B Positive (B+)</option>
                <option value="B-">B Negative (B-)</option>
                <option value="AB+">AB Positive (AB+)</option>
                <option value="AB-">AB Negative (AB-)</option>
            </select>

            <div class="grid grid-cols-2 gap-3 mt-2">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-bold">Gender</label>
                    <select id="edit-gender" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-gray-300 focus:outline-none focus:border-amber-500 appearance-none">
                        <option value="Boy">Boy</option>
                        <option value="Girl">Girl</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-bold">Vehicle</label>
                    <select id="edit-transport" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-gray-300 focus:outline-none focus:border-amber-500 appearance-none">
                        <option value="Motorcycle">Motorcycle</option>
                        <option value="Bicycle">Bicycle</option>
                        <option value="Scooter">Scooter</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 pt-3 border-t border-slate-800">
                <button onclick="document.getElementById('modal-container-profile').classList.add('hidden')" class="flex-1 bg-slate-800 text-gray-400 font-black text-[10px] py-3.5 rounded-xl uppercase tracking-widest active:scale-95 transition mt-2">Cancel</button>
                <button onclick="saveProfileChanges()" class="flex-1 bg-amber-500 text-slate-950 font-black text-[10px] py-3.5 rounded-xl uppercase tracking-widest active:scale-95 transition mt-2">Save Details</button>
            </div>
            
            <!-- DELETION BUTTON -->
            <button onclick="deleteUserProfile()" class="w-full bg-red-950/40 border border-red-900/50 hover:bg-red-900 text-red-500 font-black text-[10px] py-3 rounded-xl uppercase tracking-widest active:scale-95 transition mt-2"><i class="fas fa-trash mr-1"></i> Delete My Account</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- OVERLAY: EMERGENCY PANIC SOS               -->
    <!-- ========================================== -->
    <div id="overlay-emergency-panic" class="hidden fixed inset-0 bg-red-950/95 z-[100] flex flex-col items-center justify-center p-6 text-center backdrop-blur-md">
        <i class="fas fa-triangle-exclamation text-7xl text-red-500 animate-ping mb-6 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]"></i>
        <h1 class="text-4xl font-black text-white uppercase tracking-widest mb-2">SOS ALERT</h1>
        <p id="sos-lbl-broadcast" class="text-red-400 text-[11px] font-bold uppercase tracking-wider mb-8 bg-red-900/40 px-3 py-1 rounded"></p>
        
        <div class="bg-red-900/20 border border-red-500/50 rounded-3xl p-6 w-full max-w-sm mb-8 space-y-5 shadow-2xl shadow-red-500/20">
            <div>
                <span class="text-[9px] text-red-400/70 font-bold uppercase tracking-widest block mb-1">Distressed Rider Identity</span>
                <span id="sos-card-name" class="text-2xl font-black text-white uppercase"></span>
            </div>
            <div>
                <span class="text-[9px] text-red-400/70 font-bold uppercase tracking-widest block mb-1">Blood Profile</span>
                <span id="sos-card-blood" class="text-2xl font-black text-white uppercase"></span>
            </div>
            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-red-900/50">
                <a id="sos-link-phone" href="#" class="bg-slate-950 border border-red-900 hover:bg-red-900/30 text-red-400 font-bold text-[10px] uppercase tracking-widest py-3.5 rounded-xl flex flex-col items-center justify-center gap-1.5 transition"><i class="fas fa-phone text-base"></i> Call Rider</a>
                <a id="sos-link-kin" href="#" class="bg-slate-950 border border-red-900 hover:bg-red-900/30 text-red-400 font-bold text-[10px] uppercase tracking-widest py-3.5 rounded-xl flex flex-col items-center justify-center gap-1.5 transition"><i class="fas fa-heart-pulse text-base"></i> Call Kin</a>
            </div>
        </div>
        
        <button onclick="suppressActiveEmergencySignal()" class="bg-slate-900 border border-red-900/50 hover:bg-slate-800 text-gray-400 font-bold text-[10px] uppercase tracking-widest px-8 py-3.5 rounded-full active:scale-95 transition"><i class="fas fa-bell-slash mr-1"></i> Acknowledge & Suppress</button>
    </div>

    <!-- ========================================== -->
    <!-- APPLICATION LOGIC & FIREBASE INTEGRATION   -->
    <!-- ========================================== -->
    <script>
        // ==========================================
        // AGORA VOICE ENGINE SETUP
        // ==========================================
        const agoraAppId = "23d40906ff6641a6b3ef2804ecd946da";
        const agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack = null;
        let remoteUsers = {}; 

        // Listen for other riders joining the voice channel
        agoraClient.on("user-published", async (user, mediaType) => {
            await agoraClient.subscribe(user, mediaType);
            console.log("Rider connected to voice:", user.uid);
            
            if (mediaType === "audio") {
                remoteUsers[user.uid] = user;
                user.audioTrack.play();
                
                if (!hardwareSpeakerActive) {
                    user.audioTrack.setVolume(0);
                } else {
                    user.audioTrack.setVolume(100);
                }
            }
        });

        agoraClient.on("user-unpublished", (user, mediaType) => {
            if (mediaType === "audio") {
                if (remoteUsers[user.uid]) delete remoteUsers[user.uid];
            }
        });

        // ENABLE "IS TALKING" UI Updates
        agoraClient.enableAudioVolumeIndicator();
        agoraClient.on("volume-indicator", (volumes) => {
            const overlay = document.getElementById('active-riders-overlay');
            if(!overlay) return;
            overlay.innerHTML = ""; // Clear current list
            
            volumes.forEach((volume) => {
                // If volume level is above 5, they are talking
                if (volume.level > 5) {
                    let speakerName = volume.uid === agoraClient.uid ? sessionProfile.username + " (You)" : "Rider " + volume.uid;
                    
                    // Change mic icon color if local user is speaking
                    if (volume.uid === agoraClient.uid) {
                        const btn = document.getElementById('btn-audio-mic');
                        btn.classList.add('text-amber-500'); 
                        btn.classList.remove('text-emerald-400', 'text-red-500'); 
                    }

                    // Add floating name tag to overlay
                    const tag = document.createElement('div');
                    tag.className = "bg-slate-900/90 border border-amber-500 text-amber-500 px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest backdrop-blur-sm animate-pulse flex items-center gap-2 shadow-lg";
                    tag.innerHTML = `<i class="fas fa-volume-high"></i> ${speakerName}`;
                    overlay.appendChild(tag);
                } else {
                     // Revert local mic color when stopped talking
                     if (volume.uid === agoraClient.uid) {
                         const btn = document.getElementById('btn-audio-mic');
                         btn.classList.remove('text-amber-500');
                         btn.classList.add(hardwareMicActive ? 'text-emerald-400' : 'text-red-500');
                     }
                }
            });
        });

        async function joinAgoraVoiceChannel(channelId) {
            try {
                // IMPORTANT: If your project requires a token, you must pass it instead of 'null' here.
                await agoraClient.join(agoraAppId, channelId, null, null);
                
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await agoraClient.publish([localAudioTrack]);
                
                localAudioTrack.setEnabled(hardwareMicActive);
                console.log("Voice channel connected successfully!");
            } catch (error) {
                console.error("Agora Error:", error);
                alert("Voice Connection Failed. If Token Error, generate a Temp Token or use Testing Mode in Agora Console! Code: " + error.code);
            }
        }

        async function leaveAgoraVoiceChannel() {
            try {
                if (localAudioTrack) {
                    localAudioTrack.stop();
                    localAudioTrack.close();
                    localAudioTrack = null;
                }
                await agoraClient.leave();
                remoteUsers = {};
                console.log("Left the voice channel.");
            } catch (error) {
                console.error("Error leaving voice intercom:", error);
            }
        }

        // ==========================================
        // FIREBASE INITIALIZATION & LOGIC

        const firebaseConfig = {
            apiKey: "AIzaSyA0JRq7wn16oc46Y2GQvdhsfK2qdSNktpQ",

            } else {
                girlBtn.className = "bg-slate-900 border-2 border-pink-500 text-pink-400 p-3 rounded-xl font-bold text-xs flex flex-col items-center justify-center gap-1.5 transition";
                boyBtn.className = "bg-slate-900 border-2 border-slate-800 text-gray-500 p-3 rounded-xl font-bold text-xs flex flex-col items-center justify-center gap-1.5 transition";

            const field = document.getElementById(targetId);
            const eye = document.getElementById(targetId + '-eye');

        function toggleAudioHardwareState(device) {
            if(device === 'mic') {
                hardwareMicActive = !hardwareMicActive;
                const btn = document.getElementById('btn-audio-mic');
                btn.className = hardwareMicActive ? "px-2.5 py-1.5 rounded bg-slate-900 border border-slate-800 text-emerald-400 transition text-sm" : "px-2.5 py-1.5 rounded bg-slate-900 border border-slate-800 text-red-500 transition text-sm";
                btn.innerHTML = hardwareMicActive ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
                
                if (localAudioTrack) {
                    localAudioTrack.setEnabled(hardwareMicActive);
                }
            } else if(device === 'speaker') {
                hardwareSpeakerActive = !hardwareSpeakerActive;
                const btn = document.getElementById('btn-audio-speaker');
                btn.className = hardwareSpeakerActive ? "px-2.5 py-1.5 rounded bg-slate-900 border border-slate-800 text-emerald-400 transition text-sm" : "px-2.5 py-1.5 rounded bg-slate-900 border border-slate-800 text-red-500 transition text-sm";
                btn.innerHTML = hardwareSpeakerActive ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
                
                Object.values(remoteUsers).forEach(user => {
                    if (user.audioTrack) {
                        user.audioTrack.setVolume(hardwareSpeakerActive ? 100 : 0);
                    }
                });
            }
        }

        function toggleAuthTab(tabName) {
            activeAuthTabState = tabName;
            document.getElementById('auth-feedback').classList.add('hidden');
            const tsni = document.getElementById('tab-signin');
            const tsnu = document.getElementById('tab-signup');
            const extra = document.getElementById('signup-extra-fields');
            const btn = document.getElementById('btn-auth-text');

            if(tabName === 'signin') {
                tsni.className = "flex-1 py-2.5 text-xs font-black rounded-xl bg-amber-500 text-slate-950 transition-all duration-200";
                tsnu.className = "flex-1 py-2.5 text-xs font-black rounded-xl text-gray-400 transition-all duration-200";
                extra.classList.add('hidden');
                btn.innerText = "Sign In Securely";
            } else {
                tsnu.className = "flex-1 py-2.5 text-xs font-black rounded-xl bg-amber-500 text-slate-950 transition-all duration-200";
                tsni.className = "flex-1 py-2.5 text-xs font-black rounded-xl text-gray-400 transition-all duration-200";
                extra.classList.remove('hidden');
                btn.innerText = "Create Permanent Cloud Profile";
            }
        }

        async function evaluateCachedSessionToken() {
            const stored = localStorage.getItem('riderx_active_session_phone');
            if(stored) {
                try {
                    const doc = await db.collection('users').doc(stored).get();
                    if(doc.exists) {
                        sessionProfile = doc.data();
                        bootDashboardViewport();
                        return;
                    }
                } catch(e) { console.error("Firebase Error:", e); }
            }
            transitionViewportContext('auth');
        }

        async function processAuthSubmission() {
            const phone = document.getElementById('inp-phone').value.trim();
            const pass = document.getElementById('inp-password').value;
            const feedback = document.getElementById('auth-feedback');

            if(!phone || !pass) {
                feedback.innerText = "Phone token and security password parameters required.";
                feedback.classList.remove('hidden');
                return;
            }

            try {
                if(activeAuthTabState === 'signup') {
                    const name = document.getElementById('inp-username').value.trim();
                    const sos = document.getElementById('inp-sos').value.trim();
                    const blood = document.getElementById('inp-blood').value;
                    const gender = document.getElementById('inp-gender').value;
                    const transport = document.getElementById('inp-transport').value;

                    if(!name || !sos) {
                        feedback.innerText = "All deployment registration metrics are mandatory.";
                        feedback.classList.remove('hidden');
                        return;
                    }

                    const docCheck = await db.collection('users').doc(phone).get();
                    if(docCheck.exists) {
                        feedback.innerText = "Token key identity already online.";
                        feedback.classList.remove('hidden');
                        return;
                    }

                    const newUser = { phone, pass, username: name, sosPhone: sos, blood, gender, transport };
                    await db.collection('users').doc(phone).set(newUser);
                    sessionProfile = newUser;

                } else {
                    const doc = await db.collection('users').doc(phone).get();
                    if(!doc.exists || doc.data().pass !== pass) {
                        feedback.innerText = "Invalid credentials.";
                        feedback.classList.remove('hidden');
                        return;
                    }
                    sessionProfile = doc.data();
                }

                localStorage.setItem('riderx_active_session_phone', phone);
                feedback.classList.add('hidden');
                bootDashboardViewport();
            } catch (error) {
                feedback.innerText = "Connection to Firebase failed. Check console.";
                feedback.classList.remove('hidden');
                console.error(error);
            }
        }

        function openProfileModal() {
            document.getElementById('edit-username').value = sessionProfile.username;
            document.getElementById('edit-sos').value = sessionProfile.sosPhone;
            document.getElementById('edit-blood').value = sessionProfile.blood;
            document.getElementById('edit-gender').value = sessionProfile.gender;
            document.getElementById('edit-transport').value = sessionProfile.transport || "Motorcycle";
            document.getElementById('modal-container-profile').classList.remove('hidden');

        async function saveProfileChanges() {
            const name = document.getElementById('edit-username').value.trim();
            const sos = document.getElementById('edit-sos').value.trim();
            const blood = document.getElementById('edit-blood').value;
            const gender = document.getElementById('edit-gender').value;
            const transport = document.getElementById('edit-transport').value;

            if (!name || !sos) {
                alert("❌ Name and SOS Phone cannot be empty!");
                return;
            }

            try {
                await db.collection('users').doc(sessionProfile.phone).update({
                    username: name, sosPhone: sos, blood: blood, gender: gender, transport: transport
                });
                sessionProfile.username = name;
                sessionProfile.sosPhone = sos;
                sessionProfile.blood = blood;
                sessionProfile.gender = gender;
                sessionProfile.transport = transport;

                bootDashboardViewport();
                document.getElementById('modal-container-profile').classList.add('hidden');
                alert("✅ Profile updated perfectly!");
            } catch (error) {
                console.error("Error updating profile:", error);
                alert("❌ Failed to update profile.");
            }
        }

        async function deleteUserProfile() {
            const confirmDelete = confirm("⚠️ STOP! Are you absolutely sure you want to delete your profile? This cannot be undone!");
            if (confirmDelete) {
                try {
                    await db.collection('users').doc(sessionProfile.phone).delete();
                    document.getElementById('modal-container-profile').classList.add('hidden');
                    alert("🗑️ Your account has been deleted.");
                    terminateSessionToken(); 
                } catch(error) {
                    alert("❌ Could not delete the profile.");
                }

            document.getElementById('dash-lbl-name').innerText = sessionProfile.username;
            document.getElementById('dash-lbl-blood').innerText = sessionProfile.blood;
            document.getElementById('dash-lbl-sos').innerText = sessionProfile.sosPhone;

            const badge = document.getElementById('dash-badge-gender');
            badge.innerText = sessionProfile.gender === 'Girl' ? 'Girl' : 'Boy';
            if(sessionProfile.gender === 'Girl') badge.className = "text-[9px] uppercase font-bold tracking-widest px-2 py-0.5 rounded border bg-pink-500/10 text-pink-400 border-pink-500/30";
            else badge.className = "text-[9px] uppercase font-bold tracking-widest px-2 py-0.5 rounded border bg-blue-500/10 text-blue-400 border-blue-500/30";

            transitionViewportContext('dashboard');
            listenToLiveRides();
        }

        function listenToLiveRides() {
            if (ridesUnsubscribe) ridesUnsubscribe();
            
            ridesUnsubscribe = db.collection('rides').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                const container = document.getElementById('live-channel-feed');
                container.innerHTML = "";
                
                if(snapshot.empty) {
                    container.innerHTML = `<div class="bg-slate-900/40 text-center py-8 text-gray-500 text-xs rounded-xl border border-slate-800">No active cross-device channel streams found.</div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const run = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center cursor-pointer hover:border-amber-500/40 transition mb-2";
                    
                    const isAdmin = run.creatorPhone === sessionProfile.phone;
                    const isPrivate = run.isPublic === false; 

                    card.innerHTML = `
                        <div class="space-y-1 truncate max-w-[55%]">
                            <h4 class="text-xs font-black text-white truncate">
                                ${run.title.toUpperCase()} 
                                ${isPrivate ? '<i class="fas fa-lock text-red-500 ml-1"></i>' : ''}
                            </h4>
                            <p class="text-[10px] text-gray-400 truncate"><i class="fas fa-location-dot text-amber-500 mr-1"></i> ${run.meet} → ${run.dest}</p>
                            <div class="text-[9px] text-amber-500 font-medium flex gap-2">
                                <span><i class="fas fa-calendar"></i> ${run.date || ''} (${run.time || ''})</span>
                            </div>
                        </div>
                        <div class="flex gap-2 items-center shrink-0">
                            ${isAdmin ? `<button onclick="openEditRideModal('${run.id}', event)" class="bg-blue-900/40 text-blue-400 px-3 py-2 rounded-xl text-[10px] uppercase font-black border border-blue-900/50 hover:bg-blue-900"><i class="fas fa-pencil"></i></button>` : ''}
                            ${isAdmin ? `<button onclick="deleteMesh('${run.id}', event)" class="bg-red-900/40 text-red-500 px-3 py-2 rounded-xl text-[10px] uppercase font-black border border-red-900/50 hover:bg-red-900"><i class="fas fa-trash"></i></button>` : ''}
                            <button onclick="attemptJoinMesh('${run.id}', event)" class="bg-slate-950 px-3 py-2 rounded-xl text-[9px] font-black text-amber-500 border border-slate-850 uppercase tracking-widest"><i class="fas fa-satellite-dish mr-1"></i> Join</button>

        function openNewRideModal() {
            editingRideId = null; 
            document.getElementById('modal-ride-title').innerHTML = `<i class="fas fa-route mr-1"></i> Initialize Deployment`;

        async function openEditRideModal(channelId, event) {
            event.stopPropagation();
            const doc = await db.collection('rides').doc(channelId).get();
            if(!doc.exists) return;
            const run = doc.data();

            editingRideId = channelId; 
            
            document.getElementById('modal-ride-title').innerHTML = `<i class="fas fa-pencil mr-1"></i> Edit Mesh Group`;
            document.getElementById('form-title').value = run.title;
            document.getElementById('form-meet').value = run.meet;
            document.getElementById('form-dest').value = run.dest;
            document.getElementById('form-speed').value = run.speed || "";
            document.getElementById('form-date').value = run.date;
            document.getElementById('form-time').value = run.time;
            document.getElementById('form-privacy').value = run.isPublic ? 'public' : 'private';
            document.getElementById('form-passcode').value = run.passcode || "";
            
            togglePasscodeField();
            document.getElementById('btn-deploy-ride').innerText = "Update Mesh";
            revealModalContainer(true);

        async function executeCloudRideCreation() {
            const title = document.getElementById('form-title').value.trim() || "Mesh Deployment Run";
            const meet = document.getElementById('form-meet').value.trim();
            const dest = document.getElementById('form-dest').value.trim();
            const speed = document.getElementById('form-speed').value.trim();
            const date = document.getElementById('form-date').value;
            const time = document.getElementById('form-time').value;
            const isPublic = document.getElementById('form-privacy').value === 'public';
            const passcode = document.getElementById('form-passcode').value.trim();

            if (editingRideId !== null) {
                await db.collection('rides').doc(editingRideId).update({
                    title: title, meet: meet, dest: dest, speed: speed, 
                    date: date, time: time, isPublic: isPublic, passcode: passcode
                });
                editingRideId = null;
                revealModalContainer(false);
                alert("✅ Group details updated!");
                return; 
            }

            const newChannelId = "CH-" + Date.now();
            const record = {
                id: newChannelId, title, meet, dest, speed, date, time,
                isPublic: isPublic, passcode: passcode,
                marshal: sessionProfile.username, creatorPhone: sessionProfile.phone, createdAt: Date.now()
            };

            await db.collection('rides').doc(newChannelId).set(record);
            revealModalContainer(false);
            initializeLiveIntercomCommsMesh(record);
        }

        async function attemptJoinMesh(channelId, event) {
            event.stopPropagation(); 
            const doc = await db.collection('rides').doc(channelId).get();
            if (!doc.exists) return;
            const run = doc.data();
            
            if (run.isPublic === false && run.creatorPhone !== sessionProfile.phone) {
                const userInput = prompt("🔒 This group is private. Please enter the exact Passcode:");
                if (userInput === null || userInput.trim() !== run.passcode) {
                    alert("❌ Incorrect Passcode! You are not allowed to enter.");
                    return; 
                }
            }
            initializeLiveIntercomCommsMesh(run);
        }

        async function deleteMesh(channelId, event) {
            event.stopPropagation();
            if(confirm("🗑️ Are you sure you want to completely delete this mesh group?")) {
                await db.collection('rides').doc(channelId).delete();
                alert("Group deleted successfully!");
            }
        }

        function initializeLiveIntercomCommsMesh(runObject) {
            activeRideChannelId = runObject.id;
            document.getElementById('hud-txt-title').innerText = runObject.title.toUpperCase();
            document.getElementById('hud-txt-path').innerHTML = `<i class="fas fa-location-dot text-amber-500 mr-1"></i> ${runObject.meet} → ${runObject.dest}`;
            
            currentIntercomRoomEntryTimestamp = Date.now();
            triggeredSosAlerts.clear();

            transitionViewportContext('intercom');
            bootIntercomTimerMetric(true);
            setupHardwareMapDevice(); // Initializes Map AND Real-time location sync
            
            listenToLiveChat(activeRideChannelId);
            joinAgoraVoiceChannel(activeRideChannelId);
        }

        function listenToLiveChat(channelId) {
            if (chatUnsubscribe) chatUnsubscribe();
            
            chatUnsubscribe = db.collection('chat').where('channelId', '==', channelId).onSnapshot(snapshot => {
                const container = document.getElementById('chat-stream-node');
                container.innerHTML = "";
                
                let messages = [];
                snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                messages.sort((a, b) => a.timestamp - b.timestamp);

                messages.forEach(packet => {
                    if(packet.isSOS === true && packet.timestamp > currentIntercomRoomEntryTimestamp && !triggeredSosAlerts.has(packet.id)) { 
                        triggeredSosAlerts.add(packet.id);
                        displayGlobalSOSOverlayHUD(packet.emergencyProfile); 
                    }

                    const row = document.createElement('div');
                    row.className = "mt-3 flex flex-col w-full";
                    
                    if(packet.isSOS === true) {
                        row.innerHTML = `<div class="w-full p-2.5 bg-red-950/40 border border-red-900/30 rounded-xl text-[10px] text-center text-red-400 font-bold uppercase tracking-wide">${packet.message}</div>`;
                    } else if(packet.senderPhone === sessionProfile.phone) {
                        row.innerHTML = `<div class="self-end bg-amber-500 text-slate-950 p-2.5 px-3.5 rounded-2xl rounded-tr-none font-semibold text-xs max-w-[85%] ml-auto">${packet.message}</div>`;
                    } else {
                        row.innerHTML = `<div class="self-start bg-slate-900 border border-slate-800 text-white p-2.5 px-3.5 rounded-2xl rounded-tl-none font-medium text-xs max-w-[85%] mr-auto"><span class="block text-[9px] text-amber-500 font-black mb-1 tracking-wider uppercase">${packet.senderName}</span>${packet.message}</div>`;
                    }
                    container.appendChild(row);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        async function commitChatMessageNode() {
            const input = document.getElementById('inp-chat-msg');
            const val = input.value.trim();
            if(!val || !activeRideChannelId) return;

            const packet = {
                channelId: activeRideChannelId, 
                senderName: sessionProfile.username, 
                senderPhone: sessionProfile.phone, 
                message: val, 
                isSOS: false, 
                timestamp: Date.now()
            };
            
            await db.collection('chat').add(packet);
            input.value = "";
        }

        async function sendUtilityRequest(messageText) {
            if(!activeRideChannelId) return;
            const packet = {
                channelId: activeRideChannelId, 
                senderName: sessionProfile.username, 
                senderPhone: sessionProfile.phone, 
                message: messageText, 
                isSOS: false, 
                timestamp: Date.now()
            };
            await db.collection('chat').add(packet);
        }

        async function armGlobalEmergencyPanicSignal() {
            if(!activeRideChannelId) return;

            // 1. Capture Coordinates & Dispatch SOS
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;

                const packet = {
                    channelId: activeRideChannelId, 
                    senderName: sessionProfile.username, 
                    senderPhone: sessionProfile.phone, 
                    message: `🚨 CRITICAL SOS ALERT! <a href="${mapsLink}" target="_blank" class="block mt-1 underline text-blue-300">Click to Open Google Maps Location</a>`, 
                    isSOS: true, 
                    emergencyProfile: sessionProfile, 
                    timestamp: Date.now(),
                    lat: lat,
                    lng: lng
                };
                await db.collection('chat').add(packet);
            }, async (error) => {
                // 2. Fallback if location permission denied
                const packet = {
                    channelId: activeRideChannelId, 
                    senderName: sessionProfile.username, 
                    senderPhone: sessionProfile.phone, 
                    message: "🚨 CRITICAL SOS ALERT TRIGGERED! (Location denied by device)", 
                    isSOS: true, 
                    emergencyProfile: sessionProfile, 
                    timestamp: Date.now()
                };
                await db.collection('chat').add(packet);
            }, { enableHighAccuracy: true });
        }

        function transitionViewportContext(target) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-dashboard').classList.add('hidden');
            document.getElementById('screen-history').classList.add('hidden');
            document.getElementById('screen-intercom').classList.add('hidden');
            
            if(target === 'auth') document.getElementById('screen-auth').classList.remove('hidden');
            if(target === 'dashboard') document.getElementById('screen-dashboard').classList.remove('hidden');
            if(target === 'history') { document.getElementById('screen-history').classList.remove('hidden'); fetchHistory(); }
            if(target === 'intercom') document.getElementById('screen-intercom').classList.remove('hidden');
        }

        async function fetchHistory() {
            const container = document.getElementById('history-container-node');
            container.innerHTML = `<div class="bg-slate-900/40 text-center py-10 text-gray-500 text-xs rounded-xl border border-slate-800"><i class="fas fa-spinner fa-spin mr-1"></i> Retrieving Secure Logs...</div>`;
            const snapshot = await db.collection('rides').where('creatorPhone', '==', sessionProfile.phone).get();
            container.innerHTML = "";
            if(snapshot.empty) {
                container.innerHTML = `<div class="bg-slate-900/40 text-center py-10 text-gray-500 text-xs rounded-xl border border-slate-800">No past deployment logs.</div>`;
                return;
            }
            snapshot.forEach(doc => {
                const run = doc.data();
                const node = document.createElement('div');
                node.className = "bg-slate-900 border border-slate-800 p-4 rounded-xl space-y-1.5 mt-3";
                node.innerHTML = `
                    <h4 class="text-xs font-black text-amber-500">${run.title.toUpperCase()}</h4>
                    <p class="text-[10px] text-gray-400 font-medium"><i class="fas fa-location-dot text-amber-500 mr-1"></i> ${run.meet} → ${run.dest}</p>
                    <p class="text-[9px] text-gray-500 font-bold tracking-widest uppercase"><i class="fas fa-clock mr-1"></i> ${run.date} @ ${run.time}</p>
                `;
                container.appendChild(node);
            });
        }

        function terminateSessionToken() {
            suppressActiveEmergencySignal();
            terminateIntercomChannel();
            if(ridesUnsubscribe) ridesUnsubscribe();
            localStorage.removeItem('riderx_active_session_phone');
            sessionProfile = null;
            transitionViewportContext('auth');
            toggleAuthTab('signin');
        }

        function revealModalContainer(shouldShow) {
            const modal = document.getElementById('modal-container-create');
            if(shouldShow) modal.classList.remove('hidden'); else modal.classList.add('hidden');
        }

        function bootIntercomTimerMetric(isArmed) {
            clearInterval(intercomTimerInterval);
            if(!isArmed) { document.getElementById('comms-timer-lbl').innerText = "00:00"; return; }
            timerSeconds = 0;
            intercomTimerInterval = setInterval(() => {
                timerSeconds++;
                let m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                let s = (timerSeconds % 60).toString().padStart(2, '0');
                document.getElementById('comms-timer-lbl').innerText = `${m}:${s}`;
            }, 1000);
        }

        function setupHardwareMapDevice() {
            setTimeout(() => {
                if (!leafletMapInstance) {
                    leafletMapInstance = L.map('live-telemetry-map', { zoomControl: false, attributionControl: false }).setView([23.8103, 90.4125], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(leafletMapInstance);
                    currentPositionMarker = L.circleMarker([23.8103, 90.4125], { color: '#f59e0b', fillColor: '#f59e0b', fillOpacity: 0.8, radius: 7 }).addTo(leafletMapInstance);
                    currentPositionMarker.bindTooltip("YOU", {permanent: true, direction: 'right', className: 'rider-map-label'}).openTooltip();
                } else {
                    leafletMapInstance.invalidateSize();
                }
                
                // Track location continuously
                if (navigator.geolocation) {
                    // Sync local user location every 5 seconds to Firebase
                    locationSyncInterval = setInterval(() => {
                        navigator.geolocation.getCurrentPosition(pos => {
                            const lat = pos.coords.latitude;
                            const lng = pos.coords.longitude;
                            
                            leafletMapInstance.setView([lat, lng], 15);
                            currentPositionMarker.setLatLng([lat, lng]);

                            if(activeRideChannelId) {
                                db.collection('live_locations').doc(sessionProfile.phone).set({
                                    channelId: activeRideChannelId, phone: sessionProfile.phone, name: sessionProfile.username, lat: lat, lng: lng, timestamp: Date.now()
                                });
                            }
                        }, () => {}, { enableHighAccuracy: true });
                    }, 5000); 

                    // Listen to all other riders in this mesh
                    locationUnsubscribe = db.collection('live_locations').where('channelId', '==', activeRideChannelId).onSnapshot(snapshot => {
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            // Skip drawing our own map marker again
                            if(data.phone !== sessionProfile.phone) {
                                if(remoteRiderMarkers[data.phone]) {
                                    remoteRiderMarkers[data.phone].setLatLng([data.lat, data.lng]);
                                } else {
                                    let m = L.circleMarker([data.lat, data.lng], { color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.8, radius: 7 }).addTo(leafletMapInstance);
                                    m.bindTooltip(data.name, {permanent: true, direction: 'right', className: 'rider-map-label'}).openTooltip();
                                    remoteRiderMarkers[data.phone] = m;
                                }
                            }
                        });
                    });
                }
            }, 200);
        }

        function terminateIntercomChannel() {
            suppressActiveEmergencySignal();
            bootIntercomTimerMetric(false);
            
            // Clean up Maps Syncing
            clearInterval(locationSyncInterval);
            if(locationUnsubscribe) locationUnsubscribe();
            
            // Remove Remote Markers from UI
            Object.values(remoteRiderMarkers).forEach(marker => { leafletMapInstance.removeLayer(marker); });
            remoteRiderMarkers = {};

            // Delete our last location from Firebase so others don't see us lingering
            if(activeRideChannelId) {
                db.collection('live_locations').doc(sessionProfile.phone).delete();
            }

            activeRideChannelId = null;
            triggeredSosAlerts.clear();
            currentIntercomRoomEntryTimestamp = 0;
            
            leaveAgoraVoiceChannel();
            
            if(chatUnsubscribe) chatUnsubscribe();
            transitionViewportContext('dashboard');
        }

        function displayGlobalSOSOverlayHUD(profile) {
            document.getElementById('sos-lbl-broadcast').innerHTML = `<i class="fas fa-tower-broadcast mr-1"></i> Signal Origin: ${profile.username}`;
            document.getElementById('sos-card-name').innerText = profile.username;
            document.getElementById('sos-card-blood').innerText = profile.blood;
            document.getElementById('sos-link-phone').href = `tel:${profile.phone}`;
            document.getElementById('sos-link-kin').href = `tel:${profile.sosPhone}`;
            document.getElementById('overlay-emergency-panic').classList.remove('hidden');

            if (!webAudioContextInstance) webAudioContextInstance = new (window.AudioContext || window.webkitAudioContext)();
            if (!localSirenAudioInterval && hardwareSpeakerActive) {
                localSirenAudioInterval = setInterval(() => {
                    executeHardwareFrequencyChirp(900, 0.15);
                    setTimeout(() => executeHardwareFrequencyChirp(600, 0.15), 180);
                }, 350);
            }
        }

        function executeHardwareFrequencyChirp(freq, length) {
            if(!webAudioContextInstance || !hardwareSpeakerActive) return;
            try {
                let osc = webAudioContextInstance.createOscillator();
                let gain = webAudioContextInstance.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.08, webAudioContextInstance.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, webAudioContextInstance.currentTime + length);
                osc.connect(gain);
                gain.connect(webAudioContextInstance.destination);
                osc.start();
                osc.stop(webAudioContextInstance.currentTime + length);
            } catch(err) {}
        }

        function suppressActiveEmergencySignal() {
            document.getElementById('overlay-emergency-panic').classList.add('hidden');
            if (localSirenAudioInterval) {
                clearInterval(localSirenAudioInterval);
                localSirenAudioInterval = null;
            }
        }
    </script>
</body>
