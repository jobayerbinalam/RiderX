<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiderX Voice Gateway</title>
    
    <!-- Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #1e1e24; 
            color: white; 
            text-align: center; 
            padding: 50px; 
        }
        button { 
            padding: 15px 30px; 
            font-size: 16px; 
            margin: 10px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
        }
        #join-btn { background-color: #4CAF50; color: white; }
        #leave-btn { background-color: #f44336; color: white; display: none; }
        #status { margin-top: 20px; font-size: 18px; color: #ffeb3b; }
    </style>
</head>
<body>

    <h2>RiderX Voice Connection Test</h2>
    <button id="join-btn">Connect Voice</button>
    <button id="leave-btn">Disconnect</button>
    <p id="status">Status: Disconnected</p>

    <script>
        // --- YOUR EXACT AGORA CREDENTIALS ---
        const APP_ID = "23d40906ff6641a6b3ef2804ecd946da"; 
        const TOKEN = "007eJxTYNgnVnxmVr3JTd03fets//Q+O7mjfYFg3AX+19f4j6bsilJUYDAyTjExsDQwS0szMzMxTDRLMk5NM7IwMElNTrE0MUtJtHWLyGoIZGQ4+vUqAyMUgvisDEWZKalFDAwABFUh+A==";
        const CHANNEL = "rider";

        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack;

        // --- JOIN LOGIC ---
        document.getElementById("join-btn").onclick = async function () {
            try {
                document.getElementById("status").innerText = "Status: Connecting to Gateway...";
                
                // This is the exact line that fixes your CAN_NOT_GET_GATEWAY_SERVER error
                await client.join(APP_ID, CHANNEL, TOKEN, null);
                
                // Turn on Microphone
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await client.publish([localAudioTrack]);

                // Update UI
                document.getElementById("status").innerText = "Status: Connected to '" + CHANNEL + "' channel!";
                document.getElementById("status").style.color = "#4CAF50";
                document.getElementById("join-btn").style.display = "none";
                document.getElementById("leave-btn").style.display = "inline-block";
                
                console.log("Successfully connected to Agora Voice!");
            } catch (error) {
                console.error("Agora Error:", error);
                document.getElementById("status").innerText = "Connection Failed: " + error.code;
                document.getElementById("status").style.color = "#f44336";
            }
        };

        // --- LEAVE LOGIC ---
        document.getElementById("leave-btn").onclick = async function () {
            if (localAudioTrack) {
                localAudioTrack.close();
            }
            await client.leave();
            
            // Update UI
            document.getElementById("status").innerText = "Status: Disconnected";
            document.getElementById("status").style.color = "#ffeb3b";
            document.getElementById("join-btn").style.display = "inline-block";
            document.getElementById("leave-btn").style.display = "none";
        };
    </script>
</body>
</html>
